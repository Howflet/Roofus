<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GreenGrid Hapeville</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{
    --bg:#0c1115; --panel:#141b22; --panel2:#1b242d; --line:#26323d;
    --txt:#e8eef2; --muted:#8b9aa7; --emerald:#34d399; --cyan:#22d3ee;
    --amber:#fbbf24; --red:#f87171; --accent:#34d399;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  #app{display:flex;flex-direction:column;height:100%}

  /* Header */
  header{display:flex;align-items:center;gap:18px;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);z-index:5}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:.3px}
  .logo .leaf{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--emerald),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:15px}
  .logo small{color:var(--muted);font-weight:500;font-size:12px}
  .stats{display:flex;gap:22px;margin-left:auto;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;line-height:1.1}
  .stat b{font-size:17px}.stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  /* Layout */
  #main{flex:1;display:flex;min-height:0}
  #map{flex:1;position:relative}
  #side{width:380px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:0}

  /* Map controls */
  .ctrls{position:absolute;top:12px;left:12px;z-index:3;display:flex;flex-direction:column;gap:8px}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:9px 13px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;transition:.15s}
  .btn:hover{border-color:var(--emerald)}
  .btn.on{background:var(--emerald);color:#06281c;border-color:var(--emerald)}
  .legend{position:absolute;bottom:14px;left:12px;z-index:3;background:rgba(20,27,34,.92);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px}
  .legend .row{display:flex;align-items:center;gap:8px;margin:3px 0}
  .sw{width:14px;height:14px;border-radius:3px}

  /* Side panel */
  .ph{padding:40px 22px;color:var(--muted);text-align:center}
  .sec{padding:16px 18px;border-bottom:1px solid var(--line)}
  .sec h3{margin:0 0 10px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .addr{font-size:17px;font-weight:700;margin:0 0 2px}
  .sub{color:var(--muted);font-size:12px;margin:0}

  .gauge{display:flex;align-items:center;gap:16px}
  .ring{--p:0;--c:var(--emerald);width:78px;height:78px;border-radius:50%;flex:none;
    background:conic-gradient(var(--c) calc(var(--p)*1%),#22303b 0);display:flex;align-items:center;justify-content:center}
  .ring i{width:60px;height:60px;border-radius:50%;background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;font-style:normal}
  .ring b{font-size:22px}.ring span{font-size:9px;color:var(--muted)}
  .tier{font-weight:700;font-size:15px}.tier+div{color:var(--muted);font-size:12px}

  .bars .b{margin:7px 0}
  .bars .b .t{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
  .bars .b .track{height:6px;background:#22303b;border-radius:4px;overflow:hidden}
  .bars .b .fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--cyan),var(--emerald))}

  .kv{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .kv div{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
  .kv span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .kv b{font-size:15px}

  .tabs{display:flex;gap:6px;padding:12px 18px 0}
  .tab{flex:1;text-align:center;padding:8px;border-radius:8px 8px 0 0;background:var(--panel2);border:1px solid var(--line);border-bottom:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted)}
  .tab.on{background:var(--panel);color:var(--txt);border-color:var(--emerald)}

  .pl{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .pl.tot{font-weight:700;border-bottom:none;padding-top:8px}
  .pos{color:var(--emerald)}.neg{color:var(--red)}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .pill.ok{background:rgba(52,211,153,.15);color:var(--emerald)}
  .pill.warn{background:rgba(251,191,36,.15);color:var(--amber)}
  .pill.no{background:rgba(248,113,113,.15);color:var(--red)}
  .prog{font-size:12px;margin:3px 0;display:flex;justify-content:space-between}
  .flag{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.35);color:var(--amber);font-size:11px;padding:8px 10px;border-radius:8px;margin-top:10px}
  a{color:var(--cyan)}

  /* Cluster panel */
  #cluster{position:absolute;bottom:14px;right:14px;width:330px;z-index:4;background:rgba(20,27,34,.97);border:1px solid var(--line);border-radius:14px;padding:16px;display:none;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  #cluster.show{display:block}
  #cluster h3{margin:0 0 4px;font-size:14px}
  .kwbig{font-size:34px;font-weight:800;letter-spacing:-1px}
  .thr{position:relative;height:14px;background:#22303b;border-radius:8px;margin:14px 0 4px;overflow:visible}
  .thr .f{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--cyan),var(--emerald));transition:width .4s ease}
  .thr .mark{position:absolute;top:-4px;width:2px;height:22px;background:var(--muted)}
  .thr .mark span{position:absolute;top:-16px;left:-12px;font-size:9px;color:var(--muted);white-space:nowrap}
  .dr-status{margin-top:14px;padding:10px;border-radius:9px;text-align:center;font-weight:700;font-size:14px;background:#22303b;color:var(--muted)}
  .dr-status.live{background:var(--emerald);color:#06281c}
  .dr-status.cl1{background:var(--cyan);color:#06222a}
  .csum{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
  .csum b{color:var(--txt)}
  .cclear{margin-top:10px;width:100%;justify-content:center}
  #toast{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:6;background:var(--red);color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;display:none}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo"><span class="leaf">🌿</span> GreenGrid <small>Hapeville, GA</small></div>
    <div class="stats" id="stats"></div>
  </header>
  <div id="main">
    <div id="map">
      <div class="ctrls">
        <!-- Cluster DR Mode hidden from UI (logic kept below). To restore, uncomment:
        <button class="btn" id="modeBtn">🔌 Cluster DR Mode: OFF</button>
        -->
        <button class="btn" id="ppBtn">☀️ Power-Plant View: OFF</button>
      </div>
      <div class="legend" id="legend">
        <div style="font-weight:700;margin-bottom:5px">Viability Score</div>
        <div class="row"><span class="sw" style="background:#34d399"></span> 70–100 · Strong</div>
        <div class="row"><span class="sw" style="background:#fbbf24"></span> 50–69 · Moderate</div>
        <div class="row"><span class="sw" style="background:#f87171"></span> 0–49 · Weak</div>
      </div>
      <!-- Cluster panel hidden from UI (logic kept). To restore: <div id="cluster"></div> -->
      <div id="toast"></div>
    </div>
    <div id="side"><div class="ph">Click a building on the map to see its viability score, profitability, and subsidy eligibility.</div></div>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8000";
const fmt = n => "$" + Math.round(n).toLocaleString();
const fmt0 = n => Math.round(n).toLocaleString();

let buildings = {};      // id -> feature
let grids = {};          // grid_id -> feature
let mapMode = "score";   // "score" | "der"
/* --- Cluster DR feature hidden from UI (logic preserved) ---
let clusterMode = false;
let selected = new Set();
--- end cluster vars --- */
let activeTab = "profit";
let currentId = null;

const map = new maplibregl.Map({
  container: "map",
  style: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
  center: [-84.4102, 33.6693],
  zoom: 14
});
map.addControl(new maplibregl.NavigationControl({showCompass:false}), "bottom-right");

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",3500);}

const COLOR_EXPR = {
  score: ["interpolate",["linear"],["get","score"],
      0,"#f87171", 49,"#f87171", 50,"#fbbf24", 69,"#fbbf24", 70,"#34d399", 100,"#34d399"],
  // DCO-1 readiness by dispatchable kW: <100 gray, 100-249 amber, >=250 emerald
  der: ["step",["coalesce",["get","der_dispatchable_kw"],0], "#3a4a57", 100,"#fbbf24", 250,"#34d399"],
};
const LEGENDS = {
  score: `<div style="font-weight:700;margin-bottom:5px">Viability Score</div>
    <div class="row"><span class="sw" style="background:#34d399"></span> 70–100 · Strong</div>
    <div class="row"><span class="sw" style="background:#fbbf24"></span> 50–69 · Moderate</div>
    <div class="row"><span class="sw" style="background:#f87171"></span> 0–49 · Weak</div>`,
  der: `<div style="font-weight:700;margin-bottom:5px">Rooftop Power Plant (DCO-1)</div>
    <div class="row"><span class="sw" style="background:#34d399"></span> ≥250 kW · DCO-1 ready</div>
    <div class="row"><span class="sw" style="background:#fbbf24"></span> 100–249 kW · below floor</div>
    <div class="row"><span class="sw" style="background:#3a4a57"></span> &lt;100 kW · small</div>`,
};
function applyMapMode(){
  if(map.getLayer("b-fill")) map.setPaintProperty("b-fill","fill-color",COLOR_EXPR[mapMode]);
  document.getElementById("legend").innerHTML = LEGENDS[mapMode];
}

map.on("load", async () => {
  let bjson, stats;
  try {
    bjson = await (await fetch(`${API}/buildings`)).json();
    stats = await (await fetch(`${API}/buildings/stats`)).json();
  } catch(e){
    toast("Cannot reach API at "+API+" — is the backend running?");
    return;
  }
  bjson.features.forEach(f => buildings[f.properties.id] = f);
  try {
    const gjson = await (await fetch(`${API}/grids`)).json();
    gjson.features.forEach(f => grids[f.properties.grid_id] = f);
  } catch(e){ /* grids optional */ }

  // stats bar (incl. client-computed DCO-1 power-plant headline)
  const allB = Object.values(buildings).map(f=>f.properties);
  const solarMW = (allB.reduce((s,p)=>s+(p.solar_capacity_kw||0),0)/1000).toFixed(1);
  const dco1Ready = allB.filter(p=>p.dco1_account_ready).length;
  const dco1Clusters = Object.values(grids).filter(f=>f.properties.dco1_cluster_eligible).length;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><b>${stats.total_buildings}</b><span>Buildings</span></div>
    <div class="stat"><b>${stats.total_units}</b><span>Units</span></div>
    <div class="stat"><b>${solarMW} MW</b><span>Rooftop Solar</span></div>
    <div class="stat"><b>${dco1Ready}</b><span>DCO-1 Ready</span></div>
    <div class="stat"><b>${dco1Clusters}</b><span>1 MW Clusters</span></div>`;

  map.addSource("buildings", {type:"geojson", data:bjson});

  map.addLayer({id:"b-fill", type:"fill", source:"buildings",
    paint:{"fill-color":COLOR_EXPR.score,"fill-opacity":0.8}});
  map.addLayer({id:"b-line", type:"line", source:"buildings",
    paint:{"line-color":"#0c1115","line-width":0.6}});
  // selection highlight
  map.addLayer({id:"b-sel", type:"line", source:"buildings",
    paint:{"line-color":"#22d3ee","line-width":3},
    filter:["in","id",""]});

  // fit to data
  const b = new maplibregl.LngLatBounds();
  bjson.features.forEach(f => f.geometry.coordinates[0].forEach(c => b.extend(c)));
  map.fitBounds(b, {padding:60, maxZoom:16});

  map.on("click","b-fill", e => onPick(e.features[0].properties.id));
  map.on("mouseenter","b-fill", ()=> map.getCanvas().style.cursor="pointer");
  map.on("mouseleave","b-fill", ()=> map.getCanvas().style.cursor="");
});

/* --- Cluster DR Mode button handler hidden from UI (logic preserved) ---
document.getElementById("modeBtn").onclick = () => {
  clusterMode = !clusterMode;
  const btn = document.getElementById("modeBtn");
  btn.classList.toggle("on", clusterMode);
  btn.textContent = `🔌 Cluster DR Mode: ${clusterMode?"ON":"OFF"}`;
  if(!clusterMode){ selected.clear(); refreshSel(); document.getElementById("cluster").classList.remove("show"); }
  else { renderCluster(); }
};
--- end cluster button handler --- */

document.getElementById("ppBtn").onclick = () => {
  mapMode = mapMode === "der" ? "score" : "der";
  const btn = document.getElementById("ppBtn");
  btn.classList.toggle("on", mapMode === "der");
  btn.textContent = `☀️ Power-Plant View: ${mapMode === "der" ? "ON" : "OFF"}`;
  applyMapMode();
};

function onPick(id){
  // Cluster DR mode hidden from UI (logic preserved). To restore, swap the body
  // back to the if/clusterMode branch below:
  //   if(clusterMode){
  //     selected.has(id) ? selected.delete(id) : selected.add(id);
  //     refreshSel(); renderCluster();
  //   } else { currentId = id; renderDetail(id); }
  currentId = id; renderDetail(id);
}

/* --- Cluster selection highlight helper hidden from UI (logic preserved) ---
function refreshSel(){
  map.setFilter("b-sel", ["in","id", ...(selected.size?[...selected]:[""])]);
}
--- end refreshSel --- */

/* ---------- CLUSTER DR (hidden from UI; logic preserved below) ----------
function renderCluster(){
  const el = document.getElementById("cluster");
  el.classList.add("show");
  const ids = [...selected];
  const totalKw = ids.reduce((s,id)=> s + (buildings[id].properties.curtailable_kw||0), 0);
  const totalPeak = ids.reduce((s,id)=> s + (buildings[id].properties.estimated_peak_kw||0), 0);
  const CL1=200;
  const pct = Math.min(100, totalKw/CL1*100);
  let status="dr-status", label=`${(CL1-totalKw).toFixed(0)} kW of sheddable load to reach CL-1`;
  if(totalKw>=CL1){ status+=" cl1"; label="⚡ CL-1 CURTAILABLE LOAD ELIGIBLE (200 kW)"; }
  el.innerHTML = `
    <h3>Neighborhood Cluster</h3>
    <div class="sub" style="margin-bottom:8px">${ids.length} site${ids.length===1?"":"s"} selected · click buildings to add</div>
    <div class="kwbig">${totalKw.toFixed(0)} <span style="font-size:14px;color:var(--muted)">kW curtailable (sheddable)</span></div>
    <div class="sub" style="margin:-2px 0 4px">of ${totalPeak.toFixed(0)} kW total peak across sites</div>
    <div class="thr">
      <div class="f" style="width:${pct}%"></div>
      <div class="mark" style="left:100%"><span>CL-1 200kW</span></div>
    </div>
    <div class="${status}">${label}</div>
    ${ids.length?`<div class="csum">Curtailable = smart-thermostat AC cycling + shiftable greenhouse lighting/pumps — not total building demand.<br>
       Note: CL-1 is a single-customer program; cross-owner clusters would need an aggregator.</div>`:""}
    <button class="btn cclear" onclick="selected.clear();refreshSel();renderCluster();">Clear selection</button>`;
}
--- end Cluster DR (hidden from UI) --- */

/* ---------- DETAIL PANEL ---------- */
async function renderDetail(id){
  const p = buildings[id].properties;
  const tierName = p.score>=70?"Strong candidate":p.score>=50?"Moderate":"Weak";
  const tierCol = p.score>=70?"var(--emerald)":p.score>=50?"var(--amber)":"var(--red)";
  const side = document.getElementById("side");
  const meta = [p.zoning, `${p.num_units} units`,
    p.num_floors?`${p.num_floors} floors`:null,
    p.year_built?`built ${p.year_built}`:null].filter(Boolean).join(" · ");
  side.innerHTML = `
    <div class="sec">
      <p class="addr">${p.address}</p>
      <p class="sub">${meta}</p>
      ${p.parcel_id?`<p class="sub" style="margin-top:3px">Parcel ${p.parcel_id} · ${p.data_source||"public records"}</p>`:""}
    </div>
    ${p.aggregation_grid_id?`<div class="sec">
      <a href="simulation.html?grid=${p.aggregation_grid_id}" target="_blank"
         style="display:block;text-align:center;text-decoration:none;background:var(--emerald);
                color:#06231a;font-weight:700;padding:11px;border-radius:10px;font-size:13px">
        🔬 More Insights — network simulation (${p.aggregation_grid_id})
      </a></div>`:""}
    <div class="sec">
      <div class="gauge">
        <div class="ring" style="--p:${p.score};--c:${tierCol}"><i><b>${p.score.toFixed(0)}</b><span>/100</span></i></div>
        <div><div class="tier" style="color:${tierCol}">${tierName}</div>
          <div>Site Viability Score</div></div>
      </div>
      <div class="bars" style="margin-top:12px">
        ${bar("Structural (HVAC proxy)",p.score_structural)}
        ${bar("Roof area",p.score_area)}
        ${bar("Solar exposure",p.score_solar)}
        ${bar("Zoning",p.score_zoning)}
        ${bar("Food desert",p.score_food_desert)}
        ${bar("Aggregation",p.score_aggregation)}
      </div>
      <div class="flag">⚠️ PE structural review required before construction — this tool screens viability, it does not certify load capacity.</div>
    </div>
    <div class="sec">
      <div class="kv">
        <div><span>Roof area (est.)</span><b>${fmt0(p.roof_area_sqft)} ft²</b></div>
        <div><span>Solar (GHI)</span><b>${p.avg_ghi} kWh/m²</b></div>
        <div><span>Curtailable / peak</span><b>${p.curtailable_kw??"—"} / ${p.estimated_peak_kw} kW</b></div>
        <div><span>Food desert</span><b>${p.in_food_desert?"Yes (USDA)":p.low_income_tract?"Low-income":"No"}</b></div>
      </div>
      ${p.roof_area_basis?`<div class="flag" style="background:rgba(34,211,238,.08);border-color:rgba(34,211,238,.3);color:var(--cyan)">📐 Roof area ${p.roof_area_basis}. Real lot size from county; footprint estimated.</div>`:""}
    </div>
    ${derSection(p)}
    <div class="tabs">
      <div class="tab ${activeTab==='profit'?'on':''}" onclick="setTab('profit')">🌱 Profitability</div>
      <div class="tab ${activeTab==='subs'?'on':''}" onclick="setTab('subs')">🏢 Subsidies</div>
    </div>
    <div class="sec" id="tabbody"><div class="ph">Loading…</div></div>
    <div class="sec">
      <h3>Owner (public record)</h3>
      <div class="sub">${p.owner_name||"—"}${p.owner_address?`<br>${p.owner_address}`:""}
      ${(p.owner_phone||p.owner_email)
        ? `<br>📞 <a href="tel:${p.owner_phone}">${p.owner_phone}</a> · ✉️ <a href="mailto:${p.owner_email}">${p.owner_email}</a>`
        : `<br><span style="color:var(--muted)">Phone/email not in public records.</span>`}</div>
    </div>`;
  loadTab(id);
}
function bar(label,v){return `<div class="b"><div class="t"><span>${label}</span><span>${Math.round(v)}</span></div>
  <div class="track"><div class="fill" style="width:${v}%"></div></div></div>`;}

function derSection(p){
  if(p.der_dispatchable_kw==null) return "";
  const gp = (grids[p.aggregation_grid_id]||{}).properties || {};
  const ready = p.dco1_account_ready;
  const clusterOk = !!gp.dco1_cluster_eligible;
  const acctPill = ready ? `<span class="pill ok">Clears 250 kW</span>` : `<span class="pill warn">Below 250 kW</span>`;
  const clusPill = clusterOk ? `<span class="pill ok">≥1 MW ✓</span>` : `<span class="pill warn">Under 1 MW</span>`;
  return `<div class="sec">
    <h3>☀️ Rooftop Power Plant — Georgia Power DCO-1</h3>
    <div class="kv">
      <div><span>Solar potential</span><b>${fmt0(p.solar_capacity_kw)} kW</b></div>
      <div><span>Dispatchable (PV+battery)</span><b>${fmt0(p.der_dispatchable_kw)} kW</b></div>
      <div><span>Annual generation</span><b>${p.der_annual_mwh} MWh</b></div>
      <div><span>Est. DCO-1 credit</span><b>${fmt(p.der_credit_est_annual)}/yr</b></div>
    </div>
    <div class="pl"><span>This building — DCO-1 account floor ${acctPill}</span><b></b></div>
    <div class="pl"><span>Cluster ${p.aggregation_grid_id} — 1 MW aggregate ${clusPill}</span><b>${fmt0(gp.dco1_qualifying_kw||0)} kW</b></div>
    <div class="pl tot"><span>${gp.dco1_accounts||0} qualifying account${(gp.dco1_accounts===1)?"":"s"} in this cluster</span><b></b></div>
    <div class="flag" style="background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.3);color:var(--emerald)">
      ⚡ DCO-1 needs dispatchable solar+battery (firm), not load-shedding. Credit = 75% of negotiated system value; figure shown is illustrative. Requires a Commercial account.</div>
  </div>`;
}

window.setTab = t => { activeTab=t; if(currentId) renderDetail(currentId); };

async function loadTab(id){
  const body = document.getElementById("tabbody");
  try{
    if(activeTab==="profit"){
      const r = await (await fetch(`${API}/buildings/${id}/revenue`)).json();
      const np = r.annual_net_profit;
      body.innerHTML = `
        <h3>Annual P&amp;L — Rooftop Greenhouse</h3>
        <div class="pl"><span>Gross revenue</span><b class="pos">${fmt(r.total_annual_revenue)}</b></div>
        <div class="pl"><span>Operating costs</span><b class="neg">−${fmt(r.total_annual_costs)}</b></div>
        <div class="pl tot"><span>Net profit / yr</span><b class="${np>=0?'pos':'neg'}">${fmt(np)}</b></div>
        <div style="margin:10px 0 4px;font-size:12px;color:var(--muted)">Margin ${r.margin_pct}% · payback ~${r.months_to_breakeven} mo · startup ${fmt(r.startup_total)}</div>
        <h3 style="margin-top:14px">Cost breakdown</h3>
        ${r.operating_costs.map(c=>`<div class="pl"><span>${c.category}</span><b>${fmt(c.amount)}</b></div>`).join("")}`;
    } else {
      const s = await (await fetch(`${API}/buildings/${id}/subsidies`)).json();
      const dr = s.demand_response_programs, ag = s.aggregation_bonus;
      const prog = (name,o)=>{
        const cls = o.eligible===true?"ok":o.eligible===false?"no":"warn";
        const lbl = o.eligible===true?"Eligible":o.eligible===false?"Not yet":"Conditional";
        let val="";
        if(o.estimated_annual_value) val=`${fmt(o.estimated_annual_value)}/yr`;
        else if(o.estimated_onetime_value) val=`${fmt(o.estimated_onetime_value)} one-time`;
        else if(o.total_property_value) val=`${fmt(o.total_property_value)}/yr`;
        else if(o.reason) val=o.reason;
        return `<div class="pl"><span>${name} <span class="pill ${cls}">${lbl}</span></span><b>${val}</b></div>`;
      };
      body.innerHTML = `
        <h3>Demand Response — Georgia Power CL-1</h3>
        ${prog("CL-1 Curtailable Load (≥200 kW)",dr.cl1_aggregated)}
        <div class="csum" style="color:var(--muted);font-size:12px;margin:4px 0 2px">
          Real tariff: credit = 75% of capacity value (negotiated), minus $120/mo admin. Commercial accounts only.</div>
        <h3 style="margin-top:14px">Aggregation Bonus — ${ag.grid_id}</h3>
        <div class="csum" style="color:var(--muted);font-size:12px">
          Grid curtailable <b style="color:var(--txt)">${ag.grid_combined_kw} kW</b> · tier <b style="color:var(--txt)">${ag.current_tier}</b><br>
          ${ag.buildings_to_next_tier} more buildings (${ag.kw_to_next_tier} kW) → ${ag.next_tier}
        </div>
        <div class="pl tot" style="margin-top:8px"><span>Energy profile</span><b>${fmt0(s.energy_profile.estimated_annual_kwh)} kWh/yr</b></div>`;
    }
  }catch(e){ body.innerHTML=`<div class="ph">Could not load (${e.message})</div>`; }
}
</script>
</body>
</html>
